name: Prebuild

on: push

jobs:
  prebuild-windows:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - uses: actions/setup-node@v4
    - uses: ilammy/msvc-dev-cmd@v1
    - run: npm install --global node-gyp prebuildify
    - run: yarn apply-libuiohook-patch
    - run: yarn --frozen-lockfile --ignore-scripts

    - name: Verify tools
      shell: cmd
      run: |
        node --version
        npm --version
        node-gyp --version
        where node-gyp

    - name: Debug prebuildify opts
      shell: cmd
      run: |
        node -e "const path = require('path'); console.log('APPDATA:', process.env.APPDATA); console.log('npm prefix:', require('child_process').execSync('npm prefix -g').toString().trim());"

    - name: Prebuild x64
      shell: cmd
      run: |
        node -e "require('prebuildify')({napi: true, arch: 'x64', nodeGyp: require('path').join(require('child_process').execSync('npm prefix -g').toString().trim(), 'node_modules/node-gyp/bin/node-gyp.js')}, (err) => { if (err) { console.error(err); process.exit(1); } })"

    - uses: actions/upload-artifact@v4
      with:
        name: windows
        path: prebuilds