name: Prebuild

on:
  workflow_dispatch:
    inputs:
      electron_version:
        description: "Electron version (e.g., 41.0.2)"
        required: true
      abi_version:
        description: "ABI version (e.g., 145)"
        required: true

env:
  ELECTRON_VERSION: "${{ github.event.inputs.electron_version }}"
  ABI_VERSION: "${{ github.event.inputs.abi_version }}"
  npm_config_disturl: "https://artifacts.electronjs.org/headers/dist"
  npm_config_runtime: "electron"
  npm_config_target: "${{ github.event.inputs.electron_version }}"

jobs:
  prebuild-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Install Dependencies
        run: yarn install --frozen-lockfile --ignore-scripts
      - name: Global Tools
        run: npm install --global node-gyp prebuildify
      - name: Apply Patch
        run: yarn apply-libuiohook-patch
      - name: Patch prebuildify and node-abi
        shell: cmd
        run: |
          node -e "const fs = require('fs'); const f = 'node_modules/prebuildify/index.js'; let s = fs.readFileSync(f, 'utf8'); s = s.replace('proc.spawn(opts.nodeGyp, args, {', 'proc.spawn(opts.nodeGyp, args, { shell: true,'); fs.writeFileSync(f, s);"
          node -e "const fs = require('fs'); const f = 'node_modules/node-abi/index.js'; let s = fs.readFileSync(f, 'utf8'); const target = process.env.ELECTRON_VERSION; const abi = process.env.ABI_VERSION; if (!s.includes(target)) { s = s.replace('const allTargets = [', 'const allTargets = [{ runtime: \'electron\', target: \'' + target + '\', abi: \'' + abi + '\' },'); fs.writeFileSync(f, s); }"
      - name: Prebuild x64
        shell: cmd
        run: node_modules\.bin\prebuildify --runtime electron --target %ELECTRON_VERSION% --arch x64
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: prebuilds

  prebuild-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: |
          sudo apt-get update
          sudo apt-get install -y libxrandr-dev libxtst-dev
      - name: Install Dependencies
        run: yarn install --frozen-lockfile --ignore-scripts
      - run: yarn apply-libuiohook-patch
      - name: Patch node-abi
        run: |
          node -e "const fs = require('fs'); const f = 'node_modules/node-abi/index.js'; let s = fs.readFileSync(f, 'utf8'); const target = process.env.ELECTRON_VERSION; const abi = process.env.ABI_VERSION; if (!s.includes(target)) { s = s.replace('const allTargets = [', 'const allTargets = [{ runtime: \'electron\', target: \'' + target + '\', abi: \'' + abi + '\' },'); fs.writeFileSync(f, s); }"
      - run: yarn prebuild --runtime electron --target ${{ env.ELECTRON_VERSION }} --arch x64
      - run: yarn prebuild --runtime electron --target ${{ env.ELECTRON_VERSION }} --arch arm64
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: prebuilds

  prebuild-darwin-x64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Dependencies
        run: yarn install --frozen-lockfile --ignore-scripts
      - run: yarn apply-libuiohook-patch
      - name: Patch node-abi
        run: |
          node -e "const fs = require('fs'); const f = 'node_modules/node-abi/index.js'; let s = fs.readFileSync(f, 'utf8'); const target = process.env.ELECTRON_VERSION; const abi = process.env.ABI_VERSION; if (!s.includes(target)) { s = s.replace('const allTargets = [', 'const allTargets = [{ runtime: \'electron\', target: \'' + target + '\', abi: \'' + abi + '\' },'); fs.writeFileSync(f, s); }"
      - run: yarn prebuild --runtime electron --target ${{ env.ELECTRON_VERSION }} --arch x64
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-x64
          path: prebuilds

  prebuild-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Dependencies
        run: yarn install --frozen-lockfile --ignore-scripts
      - run: yarn apply-libuiohook-patch
      - name: Patch node-abi
        run: |
          node -e "const fs = require('fs'); const f = 'node_modules/node-abi/index.js'; let s = fs.readFileSync(f, 'utf8'); const target = process.env.ELECTRON_VERSION; const abi = process.env.ABI_VERSION; if (!s.includes(target)) { s = s.replace('const allTargets = [', 'const allTargets = [{ runtime: \'electron\', target: \'' + target + '\', abi: \'' + abi + '\' },'); fs.writeFileSync(f, s); }"
      - run: yarn prebuild --runtime electron --target ${{ env.ELECTRON_VERSION }} --arch arm64
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: prebuilds

  create-release:
    needs:
      [
        prebuild-windows,
        prebuild-linux,
        prebuild-darwin-x64,
        prebuild-darwin-arm64,
      ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: prebuilds
      - name: Rename and Prepare Assets
        run: |
          mv prebuilds/windows/win32-x64/node.napi.node nerimity-ptt-windows-x64.node
          mv prebuilds/linux/linux-x64/node.napi.node nerimity-ptt-linux-x64.node
          mv prebuilds/linux/linux-arm64/node.napi.node nerimity-ptt-linux-arm64.node
          mv prebuilds/darwin-x64/darwin-x64/node.napi.node nerimity-ptt-darwin-x64.node
          mv prebuilds/darwin-arm64/darwin-arm64/node.napi.node nerimity-ptt-darwin-arm64.node
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "prebuilds-${{ env.ELECTRON_VERSION }}-${{ github.sha }}"
          name: "Prebuilds Electron ${{ env.ELECTRON_VERSION }}"
          files: |
            nerimity-ptt-windows-x64.node
            nerimity-ptt-linux-x64.node
            nerimity-ptt-linux-arm64.node
            nerimity-ptt-darwin-x64.node
            nerimity-ptt-darwin-arm64.node
