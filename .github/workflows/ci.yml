name: Prebuild

on: push

jobs:
  prebuild-windows:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - uses: actions/setup-node@v4
    - uses: ilammy/msvc-dev-cmd@v1
    - run: npm install --global node-gyp prebuildify
    - run: yarn apply-libuiohook-patch
    - run: yarn --frozen-lockfile --ignore-scripts

    - name: Verify tools
      shell: cmd
      run: |
        node --version
        npm --version
        node-gyp --version
        where node-gyp

    - name: Debug prebuildify source
      shell: cmd
      run: |
        node -e "const fs = require('fs'); const lines = fs.readFileSync('node_modules/prebuildify/index.js', 'utf8').split('\n'); lines.slice(205, 220).forEach((l, i) => console.log(205+i, l));"

    - name: Prebuild x64
      shell: cmd
      env:
        npm_config_node_gyp: C:\npm\prefix\node_modules\node-gyp\bin\node-gyp.js
      run: npx prebuildify --napi --arch x64

    - uses: actions/upload-artifact@v4
      with:
        name: windows
        path: prebuilds